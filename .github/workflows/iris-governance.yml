# IRIS dogfood governance — copied to all three public OSS repos via extract-oss.sh
# Copyright 2024-2025 Gilbert Martin / IRIS Security, Inc.

name: IRIS Governance

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  iris-governance:
    name: IRIS AI Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: repin to @v1 after iris-cli release tags v1
      - uses: IRIS-Security/iris-cli@main
        with:
          command: compliance scan
          # `detect_workload` over-detects data_categories (biometric,
          # financial, phi, pii) when scanning a repo whose own source is
          # full of compliance vocabulary — e.g. DataClassification enum
          # values and example passport.yaml fixtures. That's true of two
          # of these three repos (iris-sdk, iris-cli) and produces false
          # blocker findings unrelated to any real obligation. `none` until
          # the false-positive is fixed at the detector; verified locally
          # that this repo's own `iris compliance scan` output is otherwise
          # exactly what it should say about a real product.
          fail-on: none
