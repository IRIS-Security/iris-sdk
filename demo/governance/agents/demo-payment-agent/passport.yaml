apiVersion: iris.io/v1alpha1
kind: AgentPassport
metadata:
  name: demo-payment-agent
  agent_id: demo-0001-apex-capital-payment
spec:
  version: 1.0.0
  description: Processes payment transactions and loan decisions for Apex Capital customers
  owner: platform-team@apexcapital.com
  team: ai-platform
  contact_email: platform-team@apexcapital.com
  data_classification: pii
  allowed_regions:
    - us-east-1
    - us-west-2
  compliance_tags:
    - colorado-ai-act
  environments:
    - dev
    - staging
    - production
  tool_permissions:
    - tool_id: openai-api
      description: GPT-4o for loan decisioning
      allowed_actions: [call]
      data_classifications_allowed: [pii]
      requires_user_consent: true
      environments: [dev, staging, production]
    - tool_id: credit-bureau-api
      description: Credit score lookup
      allowed_actions: [read]
      data_classifications_allowed: [pii]
      requires_user_consent: false
      environments: [dev, staging, production]
    - tool_id: internal-ledger
      description: Transaction recording
      allowed_actions: [write]
      data_classifications_allowed: [pii]
      requires_user_consent: true
      environments: [staging, production]
  policy_ref: demo/governance/agents/demo-payment-agent/policy.cedar
  intent_ref: demo/governance/agents/demo-payment-agent/policy-intent.md
  evidence_vault_id: IA-demo-payment-agent-APEX0001
  is_high_risk_ai: true
  created_at: "2026-06-01T00:00:00"
  last_reviewed_at: "2026-06-01T00:00:00"
  reviewed_by: ciso@apexcapital.com
