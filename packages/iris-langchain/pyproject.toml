[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-langchain"
version = "0.2.0"
description = "IRIS governance for LangChain agents — Cedar policy on every tool call"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "IRIS Platform", email = "sdk@iris.ai" }]
dependencies = [
  "iris-security-core>=0.1.15",
  "iris-security-sdk>=0.2.7",
]

[project.optional-dependencies]
langchain = ["langchain>=0.2", "langchain-core>=0.2"]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/gimartinb/iris-sdk"
Repository = "https://github.com/gimartinb/iris-sdk"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
