[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-mcp"
version = "0.2.18"
description = "IRIS MCP Server — connect Claude to AI agent governance"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
  { name = "IRIS Platform", email = "sdk@iris.ai" }
]
keywords = ["ai-governance", "mcp", "claude", "compliance", "cursor"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "iris-security-sdk>=0.2.18",
  "iris-security-cli>=0.2.18",
  "mcp>=1.0.0",
  "anyio>=4.0",
]

[project.scripts]
iris-mcp = "iris_mcp.server:cli_main"

[tool.setuptools.packages.find]
where = ["."]
include = ["iris_mcp*"]

[project.urls]
Homepage = "https://iris-security.github.io/iris-sdk/"
Repository = "https://github.com/IRIS-Security/iris-sdk"
Documentation = "https://iris-security.github.io/iris-sdk/getting-started.html"
Issues = "https://github.com/IRIS-Security/iris-sdk/issues"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
