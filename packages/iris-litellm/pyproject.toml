[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-litellm"
version = "0.1.0"
description = "IRIS compliance intelligence from LiteLLM config and proxy — keep your router, add governance"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "IRIS Platform", email = "sdk@iris.ai" }]
dependencies = [
  "iris-security-sdk>=0.2.15",
  "httpx>=0.27",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
live = ["litellm>=1.40,<2"]
dev = [
  "pytest>=8.0",
  "ruff>=0.4",
]

[project.urls]
Homepage = "https://iris-security.github.io/iris-sdk/"
Repository = "https://github.com/IRIS-Security/iris-sdk"
Documentation = "https://iris-security.github.io/iris-sdk/getting-started.html"
Issues = "https://github.com/IRIS-Security/iris-sdk/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
