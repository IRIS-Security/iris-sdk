[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "iris-sdk"
version = "0.1.0"
description = "IRIS — AI Agent Governance SDK. Discover, register, and govern AI agents locally."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [
  { name = "IRIS Platform", email = "sdk@iris.ai" }
]
keywords = [
  "ai-governance",
  "ai-agents",
  "compliance",
  "colorado-ai-act",
  "cedar-policy",
  "llm",
  "security",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "pyyaml>=6.0",
  "pydantic>=2.0",
  "click>=8.1",
  "rich>=13.0",          # beautiful CLI output
  "httpx>=0.27",         # async HTTP for opt-in telemetry
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.25"]
openai    = ["openai>=1.30"]
langchain = ["langchain>=0.2", "langchain-core>=0.2"]
all       = ["iris-sdk[anthropic,openai,langchain]"]
dev       = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "ruff>=0.4",
  "mypy>=1.10",
]

[project.scripts]
iris = "iris_cli.main:cli"

[project.urls]
Homepage    = "https://iris.ai"
Repository  = "https://github.com/iris-platform/iris-sdk"
Docs        = "https://docs.iris.ai"
"Bug Tracker" = "https://github.com/iris-platform/iris-sdk/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
