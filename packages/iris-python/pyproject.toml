[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-sdk"
version = "0.1.0"
description = "IRIS — AI Agent Governance SDK. Govern AI agents locally."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
keywords = [
  "ai-governance",
  "ai-agents",
  "colorado-ai-act",
  "cedar-policy",
  "llm",
  "compliance",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "iris-security-core>=0.1.0",
  "pyyaml>=6.0",
  "pydantic>=2.0",
  "click>=8.1",
  "rich>=13.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.25"]
openai = ["openai>=1.30"]
gemini = ["google-genai>=0.3"]
vertexai = ["google-cloud-aiplatform>=1.60"]
langchain = ["langchain>=0.2", "langchain-core>=0.2"]
crewai = ["crewai>=0.30"]
all = ["iris-security-sdk[anthropic,openai,gemini,vertexai,langchain,crewai]"]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "ruff>=0.4",
  "mypy>=1.10",
]

[project.urls]
Homepage = "https://github.com/gimartinb/iris-sdk"
Repository = "https://github.com/gimartinb/iris-sdk"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
