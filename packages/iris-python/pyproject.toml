[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-sdk"
version = "0.2.8"
description = "IRIS — AI Agent Governance SDK. Govern AI agents locally."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
keywords = [
  "ai-governance", "policy-as-code", "cedar", "compliance",
  "llm", "ai-agents", "langchain", "anthropic", "openai",
  "colorado-ai-act", "eu-ai-act", "hipaa", "fedramp",
  "mcp", "claude", "iris", "guardrails", "responsible-ai",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Topic :: Security",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
dependencies = [
  "iris-security-core>=0.1.15",
  "pyyaml>=6.0",
  "pydantic>=2.0",
  "click>=8.1",
  "rich>=13.0",
  "httpx>=0.27",
]

[project.optional-dependencies]
anthropic = ["iris-security-anthropic>=0.2.0"]
openai = ["iris-security-openai>=0.2.0"]
google = ["iris-security-gemini>=0.2.0"]
vertexai = ["iris-security-vertexai>=0.2.0"]
langchain = ["iris-security-langchain>=0.2.0"]
crewai = ["iris-security-crewai>=0.2.0"]
mcp = ["iris-security-mcp>=0.2.0"]
scm = ["iris-security-scm>=0.2.0"]
all = [
  "iris-security-anthropic>=0.2.0",
  "iris-security-openai>=0.2.0",
  "iris-security-gemini>=0.2.0",
  "iris-security-vertexai>=0.2.0",
  "iris-security-langchain>=0.2.0",
  "iris-security-crewai>=0.2.0",
  "iris-security-mcp>=0.2.0",
  "iris-security-scm>=0.2.0",
]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "ruff>=0.4",
  "mypy>=1.10",
]

[project.urls]
Homepage = "https://gimartinb.github.io/iris-sdk/"
Repository = "https://github.com/gimartinb/iris-sdk"

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tools*", "demo*", "docs*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
