[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-crewai"
version = "0.1.1"
description = "IRIS governance for CrewAI crews — Cedar policy on every agent tool call"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "IRIS Platform", email = "sdk@iris.ai" }]
dependencies = [
  "iris-security-core>=0.1.4",
  "iris-security-sdk>=0.1.5",
]

[project.optional-dependencies]
crewai = ["crewai>=0.30"]
dev = [
  "pytest>=8.0",
  "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/gimartinb/iris-sdk"
Repository = "https://github.com/gimartinb/iris-sdk"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
