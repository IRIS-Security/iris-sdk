[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-crewai"
version = "0.2.1"
description = "IRIS governance for CrewAI crews — Cedar policy on every agent tool call"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "IRIS Platform", email = "sdk@iris.ai" }]
dependencies = [
  "iris-security-core>=0.1.17",
  "iris-security-sdk>=0.2.17",
]

[project.optional-dependencies]
crewai = ["crewai>=0.30"]
dev = [
  "pytest>=8.0",
  "ruff>=0.4",
]

[project.urls]
Homepage = "https://iris-security.github.io/iris-sdk/"
Repository = "https://github.com/IRIS-Security/iris-sdk"
Documentation = "https://iris-security.github.io/iris-sdk/getting-started.html"
Issues = "https://github.com/IRIS-Security/iris-sdk/issues"

[tool.setuptools.packages.find]
where = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
