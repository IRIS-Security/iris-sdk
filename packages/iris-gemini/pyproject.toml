[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iris-security-gemini"
version = "0.2.1"
description = "IRIS governance for Google Gemini via google-genai"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "IRIS Platform", email = "sdk@iris.ai" }]
dependencies = [
  "iris-security-core>=0.1.18",
  "iris-security-sdk>=0.2.19",
]

[project.optional-dependencies]
google = ["google-genai>=0.3"]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.4",
]

[project.urls]
Homepage = "https://iris-security.github.io/iris-sdk/"
Repository = "https://github.com/IRIS-Security/iris-sdk"
Documentation = "https://iris-security.github.io/iris-sdk/getting-started.html"
Issues = "https://github.com/IRIS-Security/iris-sdk/issues"

[tool.setuptools]
packages = ["iris_gemini"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
